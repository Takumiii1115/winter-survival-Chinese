<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>寒带冬季野外生存练习</title>
<style>
body { font-family: Arial, sans-serif; margin:20px; background:#f9f9f9; max-width: 1400px; margin-left: auto; margin-right: auto;}
h2 { text-align:center; margin-bottom:10px; color:#2c3e50; font-size: 24px;}
.hint { text-align:center; color:#d9534f; font-weight:bold; margin-bottom:15px; font-size:15px;}
label { font-size:16px; font-weight:bold; margin-right:10px;}
input.text-input { font-size:16px; padding:5px 10px; margin-bottom:12px; width:180px;}

table { 
  width:100%; 
  border-collapse:collapse; 
  background:white; 
  table-layout: fixed;
  font-size: 13px;
}
th,td { 
  border:1px solid #ccc; 
  padding:6px 3px; 
  text-align:center; 
}
th { 
  background:#f0f0f0; 
  font-size:12px; 
  line-height:1.2;
  font-weight: bold;
}
td { line-height:1.3;}
input.rank-input { 
  width:45px; 
  text-align:center; 
  font-size:13px; 
  padding:3px;
  border: 1px solid #999;
  border-radius: 3px;
}
.expert { 
  color:red; 
  font-weight:bold; 
  background:#ffe6e6;
  font-size: 14px;
}
button { 
  margin-top:15px; 
  font-size:16px; 
  padding:8px 16px; 
  background:#4285f4; 
  color:white; 
  border:none; 
  border-radius:5px; 
  cursor:pointer; 
  margin-right:10px;
}
button:hover { background:#2a63c7;}
.sum-cell { 
  background:#fff8b3; 
  font-weight:bold; 
  font-size:15px;
  color: #d32f2f;
}
.note-cell { 
  text-align:right; 
  font-weight:bold; 
  background:#f8f9fa; 
  font-size:13px;
  padding-right: 10px;
}
.step-header { background:#e3f2fd;}
.score-header { background:#fff3e0;}
tr:nth-child(even) { background:#fafafa;}
tr:hover { background:#f0f7ff;}

/* 初始隐藏列 */
.hidden-col { display: none; }

/* 列宽定义 - 紧凑版本 */
.col-item { width: 140px; }      /* 物品列 */
.col-step { width: 85px; }       /* 步骤列 */
.col-expert { width: 70px; }     /* 专家排序列 */
.col-score { width: 75px; }      /* 得分列 */

/* 提交提示样式 - 初始隐藏 */
.submit-hint { 
  display: none;
  margin-top:12px; 
  padding:8px 12px; 
  background:#e8f5e9; 
  border-left:4px solid #4caf50; 
  color:#2e7d32; 
  font-weight:bold; 
  font-size:14px;
}
</style>
</head>
<body>

<h2>❄️ 寒带冬季野外生存练习 ❄️</h2>
<div id="hint" class="hint">👉 请先完成第1-3步的排序，然后点击"计算结果"</div>

<label>你的团队编号：</label>
<input id="group" class="text-input" placeholder="请输入小组编号"><br>

<label>你的姓名：</label>
<input id="name" class="text-input" placeholder="请输入姓名"><br>

<table id="score-table">
<tr id="header-row">
<th class="col-item">物品</th>
<th class="col-step step-header">第1步<br>个人排序<br><small>(讨论前)</small></th>
<th class="col-step step-header">第2步<br>团队排序<br><small>(讨论后)</small></th>
<th class="col-step step-header">第3步<br>个人排序<br><small>(讨论后)</small></th>
<th class="col-expert hidden-col expert-col">专家<br>排序</th>
<th class="col-score hidden-col score-col">第4步<br>个人得分</th>
<th class="col-score hidden-col score-col">第5步<br>团队得分</th>
<th class="col-score hidden-col score-col">第6步<br>个人得分</th>
</tr>
</table>

<button onclick="calc()">计算结果</button>
<button onclick="submitData()" id="submitBtn" style="display:none;">提交结果</button>
<div id="submitHint" class="submit-hint">
✅ 计算完成！请检查得分后点击"提交结果"按钮提交数据
</div>

<script>

// 冬季野外生存物品列表（仅中文）
const items = [
"一团粗毛线",
"一柄手斧",
"一支满匣子弹的手枪",
"金属大罐装固体黄油",
"报纸（每人一份）",
"一只打火机（已经没油了）",
"防寒衣物（每人一套）",
"一块20英尺×20英尺的厚帆布",
"塑料制成的航空地图",
"一升高酒精含量的威士忌",
"一个指南针",
"家庭装的巧克力棒（每人一份）"
];

// 专家排序
const expert = [2, 6, 9, 4, 8, 1, 3, 5, 12, 10, 11, 7];

const table = document.getElementById("score-table");
let calculated = false;

// 初始化表格
items.forEach((item, i) => {
const tr = document.createElement("tr");
tr.innerHTML = `
<td style="text-align:left; padding-left:8px; font-weight:bold; font-size:12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${item}">${item}</td>
<td><input id="p1-${i}" class="rank-input" placeholder="1-12" min="1" max="12"></td>
<td><input id="p2-${i}" class="rank-input" placeholder="1-12" min="1" max="12"></td>
<td><input id="p3-${i}" class="rank-input" placeholder="1-12" min="1" max="12"></td>
<td id="exp-${i}" class="expert hidden-col expert-col">${expert[i]}</td>
<td id="s4-${i}" class="hidden-col score-cell" style="background:#fff8b3;"></td>
<td id="s5-${i}" class="hidden-col score-cell" style="background:#fff8b3;"></td>
<td id="s6-${i}" class="hidden-col score-cell" style="background:#fff8b3;"></td>
`;
table.appendChild(tr);
});

// 添加总计行（初始隐藏）
const sumRow = document.createElement("tr");
sumRow.id = "sum-row";
sumRow.style.display = "none";
sumRow.innerHTML = `
<td class="note-cell" colspan="4" style="font-size:13px;">
排序差值总和 (值越低越好) →
</td>
<td class="hidden-col expert-col">-</td>
<td id="sum4" class="sum-cell hidden-col"></td>
<td id="sum5" class="sum-cell hidden-col"></td>
<td id="sum6" class="sum-cell hidden-col"></td>
`;
table.appendChild(sumRow);

function calc(){
let total4=0, total5=0, total6=0;
let valid = true;
let emptyFields = [];

// 验证所有字段
items.forEach((_, i) => {
let p1 = document.getElementById(`p1-${i}`).value.trim();
let p2 = document.getElementById(`p2-${i}`).value.trim();
let p3 = document.getElementById(`p3-${i}`).value.trim();

if(!p1 || !p2 || !p3) {
valid = false;
emptyFields.push(i+1);
return;
}

p1 = Number(p1);
p2 = Number(p2);
p3 = Number(p3);

// 验证输入范围
if(isNaN(p1) || isNaN(p2) || isNaN(p3) || p1 < 1 || p1 > 12 || p2 < 1 || p2 > 12 || p3 < 1 || p3 > 12) {
valid = false;
return;
}

let exp = expert[i];
let v4 = Math.abs(p1 - exp);
let v5 = Math.abs(p2 - exp);
let v6 = Math.abs(p3 - exp);

document.getElementById(`s4-${i}`).innerText = v4;
document.getElementById(`s5-${i}`).innerText = v5;
document.getElementById(`s6-${i}`).innerText = v6;

total4 += v4;
total5 += v5;
total6 += v6;
});

if(!valid) {
if(emptyFields.length > 0) {
alert(`请填写所有物品的排序！缺少第 ${emptyFields.join(', ')} 个物品的排序。`);
} else {
alert("请确保所有排序数字都在1-12之间！");
}
return;
}

// 显示总和
document.getElementById("sum4").innerText = total4;
document.getElementById("sum5").innerText = total5;
document.getElementById("sum6").innerText = total6;

// 显示隐藏的列
document.querySelectorAll(".hidden-col").forEach(el => {
el.style.display = "table-cell";
});
document.getElementById("sum-row").style.display = "table-row";

// 隐藏初始提示，显示提交按钮和提交提示
document.getElementById("hint").style.display = "none";
document.getElementById("submitBtn").style.display = "inline-block";
document.getElementById("submitHint").style.display = "inline-block";

calculated = true;

// 滚动到表格底部
setTimeout(() => {
document.getElementById("sum-row").scrollIntoView({ behavior: 'smooth' });
}, 100);
}

function submitData(){
if(!calculated) {
alert("请先点击'计算结果'按钮！");
return;
}

const group = document.getElementById("group").value.trim();
const name = document.getElementById("name").value.trim();

if(!group || !name){
alert("请输入团队编号和姓名！");
return;
}

// 构建数据对象
const payload = {
group: group,
name: name,
timestamp: new Date().toISOString()
};

// 添加每个物品的数据
items.forEach((item, i) => {
payload[`item${i}_name`] = item;
payload[`item${i}_step1`] = document.getElementById(`p1-${i}`).value;
payload[`item${i}_step2`] = document.getElementById(`p2-${i}`).value;
payload[`item${i}_step3`] = document.getElementById(`p3-${i}`).value;
payload[`item${i}_expert`] = expert[i];
payload[`item${i}_score4`] = document.getElementById(`s4-${i}`).innerText;
payload[`item${i}_score5`] = document.getElementById(`s5-${i}`).innerText;
payload[`item${i}_score6`] = document.getElementById(`s6-${i}`).innerText;
});

// 添加总和
payload.sum4 = document.getElementById("sum4").innerText;
payload.sum5 = document.getElementById("sum5").innerText;
payload.sum6 = document.getElementById("sum6").innerText;

console.log("Sending data:", payload);

// 使用Image对象方式提交（避免CORS问题）
const scriptUrl = "https://script.google.com/macros/s/AKfycbxmCCKKMlv5NEPv8r7FoVVtw83V-YYQh6yzGSmW0-e8_QgHsOW4PeTpBMXkwDe2903OiQ/exec";

const params = new URLSearchParams();
for(let key in payload) {
params.append(key, payload[key]);
}

const img = new Image();
img.onload = function() {
alert("提交成功！😊");
document.getElementById("submitBtn").disabled = true;
document.getElementById("submitBtn").innerText = "已提交";
document.getElementById("submitHint").style.display = "none";
};
img.onerror = function() {
alert("提交成功！😊");
document.getElementById("submitBtn").disabled = true;
document.getElementById("submitBtn").innerText = "已提交";
document.getElementById("submitHint").style.display = "none";
};
img.src = scriptUrl + "?" + params.toString();
}
</script>

</body>
</html>
